name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags: ["v*"]            # tag push (e.g. v0.2.0) → publishes a Release
  workflow_dispatch:        # lets you trigger it manually from GitHub UI

permissions:
  contents: write           # required to create / update Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name OkeyCardGame `
            --add-data "okey_logic;okey_logic" `
            --add-data "okey_gui;okey_gui" `
            main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OkeyCardGame-Windows
          path: dist/OkeyCardGame.exe
          retention-days: 30

      - name: Attach EXE to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OkeyCardGame.exe
          generate_release_notes: true
